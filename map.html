<!DOCTYPE html>
<html>
<head>
  <title>Geographical Exploration</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body>

  <nav class="navbar">
    <a href="index.html" class="logo">MoMA Explorer</a>
  </nav>

  <div class="main">
    <h1>Geographical Exploration</h1>

    <!-- NEW FLEX LAYOUT -->
    <div class="explorer-layout">

      <!-- SIDEBAR -->
        <div class="sidebar">
        <button onclick="showCountries()">Show Countries</button>

        <label for="sort-countries">Sort by:</label>
        <select id="sort-countries" onchange="showCountries()">
            <option value="count">Count: high to low</option>
            <option value="alphabetical">Alphabetical: A–Z</option>
        </select>

        <div id="country-list"></div>
        </div>

      <!-- MAP -->
      <div id="map"></div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/map.js"></script>

</body>
</html>
