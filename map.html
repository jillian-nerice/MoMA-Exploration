<!DOCTYPE html>
<html>
<head>
  <title>Geographical Exploration</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body>

<nav class="navbar">
  <a href="index.html" class="logo">MoMA Explorer</a>
</nav>

<div class="main">

  <button class="back-global back-link" onclick="goHome()">← Back</button>

  <div class="content-container">

    <h1 class="page-title">Geographical Exploration</h1>

    <p class="page-blurb">
      Explore the geographic distribution of artists in MoMA’s collection. 
      Click on a country to discover artists and artworks associated with that region.
    </p>

  </div>

  <div class="explorer-layout">

    <div class="sidebar">

  <div class="sidebar-controls">
    <input 
      type="text" 
      id="country-search" 
      placeholder="Search country or nationality..." 
      oninput="showCountries()"
    >

    <button onclick="showCountries()">Show Countries</button>

    <label for="sort-countries">Sort by:</label>
    <select id="sort-countries" onchange="showCountries()">
      <option value="count">Count: high to low</option>
      <option value="alphabetical">Alphabetical: A–Z</option>
    </select>
  </div>

  <div id="country-list"></div>

</div>

    <div id="map"></div>

  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/nationalities.js"></script>
<script src="js/map.js"></script>

<script>
  function goHome() {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
